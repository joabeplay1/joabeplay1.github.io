<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play</title>
  
  <script type='text/javascript' src='//pl25954605.highrevenuegate.com/28/94/42/28944298.js'></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
      --primary:#e53e3e;--primary-dark:#c53030;
      --text:#f0f0f0;--text-muted:#888;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;text-align:center;}
    .login-logo{width:56px;height:56px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
    .login-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;}
    .login-sub{color:var(--text-muted);font-size:14px;margin-bottom:28px;}
    .login-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;}
    .login-input:focus{border-color:var(--primary);}
    .login-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
    .login-btn:hover{background:var(--primary-dark);}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);cursor:pointer;border:none;background:none;}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
    .main{max-width:1280px;margin:0 auto;padding:24px;}
    .hero{position:relative;border-radius:var(--radius);overflow:hidden;height:280px;margin-bottom:24px;}
    .hero video, .hero img{width:100%;height:100%;object-fit:cover;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.85) 0%,rgba(0,0,0,.5) 50%,transparent 100%);}
    .hero-content{position:absolute;bottom:0;left:0;padding:32px;}
    .hero-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,4vw,36px);font-weight:700;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;}
    .card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .card-thumb img{width:100%;height:100%;object-fit:cover;}
    .card-body{padding:12px 14px;}
    .card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;}
    .topbar{background:rgba(10,10,10,.85);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;}
    .player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:16px;overflow:hidden;}
    .player-wrap iframe{width:100%;height:100%;border:none;}
    @media(max-width:600px){ .grid{grid-template-columns:repeat(2,1fr);} .logo-text{display:none;} }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const ACCESS_PASSWORD = 'cineplay123';
    let videos = [
      {"id":"1","title":"jesus maravilha","source":"google_drive","video_url":"https://drive.google.com/file/d/16NuCHOmSrfANSMqts5xDZm4rueTLfUAQ/view"},
      {"id":"2","title":"jesus","source":"url_direta","video_url":"https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/c801db49b_PixVerse_V56_Image_Text_360P_Jesus_walking_sl.mp4"},
      {"id":"3","title":"SE BEBER NAO CASE 3","source":"google_drive","video_url":"https://drive.google.com/file/d/1mGim8GitvsKo7r2k_bO3-ziXsD-eCSs9/view"},
      {"id":"4","title":"VELOZES E FURIOSOS","source":"google_drive","video_url":"https://drive.google.com/file/d/14YDwXv3kqaF9ipiq4a-lp1_9gXMlXEfy/view"},
      {"id":"5","title":"MADARA RINDO","source":"google_drive","video_url":"https://drive.google.com/file/d/10jECUzhgdp0pMcoEAGfKFUH8xDTYGziJ/view"},
      {"id":"6","title":"ALOK COPACABANA","source":"google_drive","video_url":"https://drive.google.com/file/d/1BmudgnWJShrQifYmwl-2qBlZqM01oeAS/view"}
    ];

    function isLoggedIn() { return sessionStorage.getItem('cp_auth') === '1'; }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-page"><div class="login-box">
          <div class="login-logo">🎬</div><div class="login-title">Cine Play</div>
          <input class="login-input" type="password" id="loginPass" placeholder="Senha" />
          <button class="login-btn" onclick="doLogin()">Entrar</button>
        </div></div>`;
    }

    function doLogin() {
      if(document.getElementById('loginPass').value === ACCESS_PASSWORD){
        sessionStorage.setItem('cp_auth', '1'); renderHome();
      }
    }

    function renderHero() {
      const w = document.getElementById('heroWrap');
      if (!w || !videos.length) return;
      const v = videos[1]; // Jesus como destaque por ter vídeo direto
      let mediaHtml = `<img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600" />`;
      if (v.video_url.includes('.mp4') || v.source === 'url_direta') {
        mediaHtml = `<video src="${v.video_url}" autoplay loop muted playsinline></video>`;
      }
      w.innerHTML = `
        <div class="hero">${mediaHtml}<div class="hero-overlay"></div>
          <div class="hero-content">
            <div style="color:var(--primary);font-weight:700;font-size:12px;">EM DESTAQUE</div>
            <h2 class="hero-title">${v.title}</h2>
          </div>
        </div>`;
    }

    function renderHome() {
      if(!isLoggedIn()){ renderLogin(); return; }
      document.getElementById('app').innerHTML = `
        <nav class="navbar"><div class="logo"><div class="logo-icon">🎬</div><span class="logo-text">Cine Play</span></div>
        <button onclick="sessionStorage.clear(); location.reload();" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 15px;border-radius:999px;cursor:pointer;">Sair</button></nav>
        <div class="main"><div id="heroWrap"></div><div class="grid" id="grid"></div></div>`;
      renderHero();
      const grid = document.getElementById('grid');
      grid.innerHTML = videos.map(v => `
        <div class="card" onclick="playVideo('${v.id}')">
          <div class="card-thumb"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600" /></div>
          <div class="card-body"><div class="card-title">${v.title}</div></div>
        </div>`).join('');
    }

    function playVideo(id) {
      const v = videos.find(x => x.id == id);
      let embedUrl = v.video_url;
      if (v.source === 'google_drive') {
        const fId = v.video_url.match(/\/d\/([a-zA-Z0-9_-]+)/)[1];
        embedUrl = `https://drive.google.com/file/d/${fId}/preview`;
      }
      document.getElementById('app').innerHTML = `
        <div class="topbar"><button onclick="renderHome()" style="background:none;border:none;color:#888;cursor:pointer;font-size:14px;">← Voltar</button></div>
        <div class="player-main" style="padding:24px;">
          <div class="player-wrap"><iframe src="${embedUrl}" allow="autoplay" allowfullscreen></iframe></div>
          <h2 style="margin-top:20px;">${v.title}</h2>
        </div>`;
    }

    if(isLoggedIn()){ renderHome(); } else { renderLogin(); }
  </script>
</body>
</html>
