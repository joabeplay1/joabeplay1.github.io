<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CenaPlay PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
.hidden{display:none}
.center{display:flex;align-items:center;justify-content:center;height:100vh}
input,button{padding:10px;border-radius:8px;border:none;margin:5px}
button{background:#e53e3e;color:#fff;cursor:pointer}
.card{background:#111;padding:10px;margin:10px;border-radius:10px;cursor:pointer}
video,iframe{width:100%;height:400px;border:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div>
    <h2>Entrar no CenaPlay</h2>
    <input id="email" placeholder="Email"><br>
    <input id="senha" type="password" placeholder="Senha"><br>
    <button onclick="login()">Entrar</button>
    <button onclick="criarConta()">Criar Conta</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <h1 style="padding:10px">🎬 CenaPlay PRO</h1>
  <button onclick="logout()">Sair</button>
  <div id="videos"></div>
</div>

<!-- PLAYER -->
<div id="player" class="hidden">
  <button onclick="voltar()">← Voltar</button>
  <div id="videoPlayer"></div>
</div>

<script>

// ================= LOGIN =================
function criarConta(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  if(!email || !senha){alert('Preencha tudo');return}

  localStorage.setItem('user', JSON.stringify({email, senha}))
  alert('Conta criada!')
}

function login(){
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  const user = JSON.parse(localStorage.getItem('user'))

  if(user && user.email === email && user.senha === senha){
    document.getElementById('loginScreen').classList.add('hidden')
    document.getElementById('app').classList.remove('hidden')
    carregarVideos()
  } else {
    alert('Login errado')
  }
}

function logout(){
  document.getElementById('app').classList.add('hidden')
  document.getElementById('loginScreen').classList.remove('hidden')
}

// ================= VIDEOS =================

let videos = [
  {title:'Interestelar', url:'https://www.youtube.com/watch?v=zSWdZVtXT7E'},
  {title:'Lofi', url:'https://www.youtube.com/watch?v=jfKfPfyJRdk'}
]

function getYT(url){
  const m = url.match(/v=([^&]+)/)
  return m ? m[1] : null
}

function carregarVideos(){
  const div = document.getElementById('videos')
  div.innerHTML = ''

  videos.forEach(v => {
    div.innerHTML += `
      <div class="card" onclick="play('${v.url}')">
        ${v.title}
      </div>
    `
  })
}

// ================= PLAYER =================

function play(url){
  document.getElementById('app').classList.add('hidden')
  document.getElementById('player').classList.remove('hidden')

  let html = ''

  if(url.includes('youtube')){
    const id = getYT(url)
    html = `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
  } else {
    html = `<video src="${url}" controls autoplay></video>`
  }

  document.getElementById('videoPlayer').innerHTML = html
}

function voltar(){
  document.getElementById('player').classList.add('hidden')
  document.getElementById('app').classList.remove('hidden')
}

</script>

</body>
</html>
