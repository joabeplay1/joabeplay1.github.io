<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cine Play</title>
</head>

<body>

<h2>Login</h2>
<button onclick="loginGoogle()">Entrar com Google</button>
<p id="msg"></p>

<h3>Usuários online: <span id="online">0</span></h3>

<hr>

<div id="conteudo" style="display:none;">
  <h1>🎬 Bem-vindo ao Cine Play</h1>
  <p>Área liberada só pra quem tá logado 🔥</p>

  <iframe width="300" height="200"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ">
  </iframe>

  <br><br>
  <button onclick="logout()">Sair</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// CONFIG DO FIREBASE (TROCA AQUI)
const firebaseConfig = {
  apiKey: "SUA_CHAVE",
  authDomain: "SEU_APP.firebaseapp.com",
  databaseURL: "https://SEU_APP-default-rtdb.firebaseio.com",
  projectId: "SEU_APP",
  storageBucket: "SEU_APP.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

// INICIAR
firebase.initializeApp(firebaseConfig);

// LOGIN GOOGLE
function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .catch(error => {
      document.getElementById("msg").innerText = error.message;
    });
}

// LOGOUT
function logout() {
  firebase.auth().signOut();
}

// USUÁRIO ONLINE
const db = firebase.database();
const userId = Math.random().toString(36).substr(2, 9);
const userRef = db.ref("onlineUsers/" + userId);

// CONTAR ONLINE
db.ref("onlineUsers").on("value", snapshot => {
  const count = snapshot.numChildren();
  document.getElementById("online").innerText = count;
});

// VERIFICAR LOGIN
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById("msg").innerText =
      "Logado como: " + user.displayName;

    document.getElementById("conteudo").style.display = "block";

    // ENTRA ONLINE
    userRef.set(true);
    userRef.onDisconnect().remove();

  } else {
    document.getElementById("conteudo").style.display = "none";
    document.getElementById("msg").innerText = "Faça login!";
  }
});
</script>

</body>
</html>
