<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play</title>
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
  --primary:#e53e3e;--primary-dark:#c53030;
  --text:#f0f0f0;--text-muted:#888;--radius:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

/* Estilo do Contador Online */
.online-badge {
    background: rgba(74, 222, 128, 0.1);
    color: #4ade80;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    border: 1px solid rgba(74, 222, 128, 0.2);
    display: flex;
    align-items: center;
    gap: 6px;
}
.online-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;text-align:center;}
.login-logo{width:56px;height:56px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
.login-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;}
.login-sub{color:var(--text-muted);font-size:14px;margin-bottom:28px;}
.login-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;}
.login-input:focus{border-color:var(--primary);}
.login-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
.login-btn:hover{background:var(--primary-dark);}
.login-error{color:#f87171;font-size:13px;margin-top:10px;display:none;}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);cursor:pointer;border:none;background:none;}
.logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
.search-wrap{flex:1;max-width:420px;position:relative;}
.search-wrap input{width:100%;padding:8px 16px 8px 40px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:14px;outline:none;}
.search-wrap input:focus{border-color:var(--primary);}
.navbar-actions{display:flex;gap:8px;align-items:center;}
.btn-karaoke{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:999px;font-weight:500;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-karaoke:hover{border-color:var(--primary);color:var(--primary);}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:24px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
.card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
.card-thumb img,.card-thumb video{width:100%;height:100%;object-fit:cover;}
.card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;}
.card:hover .card-overlay{opacity:1;}
.play-btn{width:52px;height:52px;border-radius:50%;background:rgba(229,62,62,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-body{padding:12px 14px;}
.card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;line-height:1.4;}

/* DETAIL MODAL */
.detail-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;}
.detail-bg.hidden{display:none;}
.detail-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:600px;overflow:auto;}
.detail-cover{position:relative;aspect-ratio:16/9;width:100%;background:#000;overflow:hidden;}
.detail-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:32px;height:32px;color:#fff;cursor:pointer;}

/* TOOLS */
.tools-header{background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.tool-tab{padding:8px 20px;border-radius:999px;border:1px solid var(--border);background:var(--bg2);color:var(--text-muted);cursor:pointer;}
.tool-tab.active{background:var(--primary);color:#fff;}
.iframe-wrap{width:100%;height:calc(100vh - 64px);border:none;}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .logo-text{display:none;}
}</style>
</head>
<body>
  <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;"></div>
  <div id="app"></div>

<script type="module">
// --- INÍCIO DA INTEGRAÇÃO FIREBASE (SISTEMA ONLINE/OFFLINE) ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAEhCjjnW2dzOd1gRLc0KHkf3lOEYqje0c",
    authDomain: "dama-77.firebaseapp.com",
    databaseURL: "https://dama-77-default-rtdb.firebaseio.com",
    projectId: "dama-77",
    storageBucket: "dama-77.firebasestorage.app",
    messagingSenderId: "267002047594",
    appId: "1:267002047594:web:911ef1cb65d84a44a26e13"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// Lógica de Presença
const myUserId = "user_" + Math.random().toString(36).substr(2, 9);
const userStatusRef = ref(db, '/status/' + myUserId);
const connectedRef = ref(db, '.info/connected');

onValue(connectedRef, (snap) => {
    if (snap.val() === true) {
        onDisconnect(userStatusRef).remove();
        set(userStatusRef, { state: 'online', last_online: serverTimestamp() });
    }
});

// Atualizador de Contador na UI
setInterval(() => {
    const counterEl = document.getElementById('online-count');
    if (counterEl) {
        const allStatusRef = ref(db, '/status/');
        onValue(allStatusRef, (snapshot) => {
            const users = snapshot.val();
            const count = users ? Object.keys(users).length : 0;
            counterEl.innerText = count;
        }, { onlyOnce: true });
    }
}, 5000);
// --- FIM DA INTEGRAÇÃO FIREBASE ---

// Cine Play — Lógica do Site
const ACCESS_PASSWORD = 'cineplay123';
let videos = [
  { "id": "1", "title": "Tomorrowland Brasil 2025", "category": "musica_ao_vivo", "video_url": "https://drive.google.com/file/d/1tbJXT97xiZI5VcxJIsEmr_NM_Ix8I5AJ/view", "thumbnail_url": "https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/2953e0169_alok22.mp4", "source": "google_drive", "is_favorite": false },
  { "id": "2", "title": "Chucky: O Rei do Passinho", "category": "videos_engracados", "video_url": "https://drive.google.com/file/d/14DyAnKhiiQuBvoxNZK0G65EZO7VyECVO/view", "thumbnail_url": "https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/85ef4aea9_videoengraado.mp4", "source": "google_drive", "is_favorite": false },
  { "id": "3", "title": "Sasuke vs Killer Bee", "category": "animacao", "video_url": "https://drive.google.com/file/d/1SUd4il8eIY0kFXg6Xp1wvebWWiLRx7g4/view", "thumbnail_url": "https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/413022005_Gemini_Generated_Image_h9k6r6h9k6r6h9k6.png", "source": "google_drive", "is_favorite": false }
  // ... outros vídeos podem ser adicionados aqui
];

window.doLogin = function() {
    const val = document.getElementById('loginPass')?.value;
    if (val === ACCESS_PASSWORD) {
        sessionStorage.setItem('cp_auth', '1');
        renderHome();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

window.renderHome = function() {
    document.getElementById('app').innerHTML = `
    <nav class="navbar">
      <button class="logo" onclick="renderHome()">
        <div class="logo-icon">🎬</div><span class="logo-text">Cine Play</span>
      </button>
      <div class="online-badge">
        <div class="online-dot"></div>
        <span id="online-count">1</span> Online
      </div>
      <div class="navbar-actions">
        <button class="btn-karaoke" onclick="renderBiblia()">📖 Bíblia</button>
        <button class="btn-karaoke" onclick="renderFerramentas()">🔧 Ferramentas</button>
        <button class="btn-karaoke" onclick="renderKaraoke()">🎙 Karaokê</button>
      </div>
    </nav>
    <div class="main">
      <div class="grid" id="gridWrap"></div>
    </div>
    <div class="detail-bg hidden" id="detailBg" onclick="closeDetail(event)">
      <div class="detail-box" id="detailBox">
        <div class="detail-cover" id="detailCover"></div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </div>`;
    renderGrid();
}

function renderGrid() {
    const w = document.getElementById('gridWrap');
    w.innerHTML = videos.map(v => `
        <div class="card" onclick="openDetail('${v.id}')">
            <div class="card-thumb">${getThumbHtml(v)}</div>
            <div class="card-body"><div class="card-title">${v.title}</div></div>
        </div>`).join('');
}

window.openDetail = function(id) {
    const v = videos.find(x => x.id == id);
    const bg = document.getElementById('detailBg');
    document.getElementById('detailCover').innerHTML = getThumbHtml(v) + `<button class="detail-close" onclick="closeDetail()">✕</button>`;
    document.getElementById('detailBody').innerHTML = `<h2>${v.title}</h2><br><button class="login-btn" onclick="playVideo('${v.id}')">ASSISTIR</button>`;
    bg.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

window.closeDetail = function() {
    document.getElementById('detailBg').classList.add('hidden');
    document.body.style.overflow = 'auto';
}

window.playVideo = function(id) {
    const v = videos.find(x => x.id == id);
    let embed = v.video_url;
    if(v.source === 'google_drive') embed = v.video_url.replace('/view', '/preview');
    
    document.getElementById('app').innerHTML = `
        <div class="tools-header"><button class="btn-karaoke" onclick="renderHome()">← Voltar</button></div>
        <div style="height:calc(100vh - 64px); background:#000;">
            <iframe src="${embed}" width="100%" height="100%" allow="autoplay" allowfullscreen></iframe>
        </div>`;
}

window.renderFerramentas = function() {
    document.getElementById('app').innerHTML = `
    <div class="tools-header">
        <button class="btn-karaoke" onclick="renderHome()">← Voltar</button>
        <button class="tool-tab active">🔧 Ferramentas</button>
    </div>
    <iframe class="iframe-wrap" src="https://joabeplay1.github.io/bate-papo/"></iframe>`;
}

function getThumbHtml(v) {
    if(v.thumbnail_url.includes('.mp4')) return `<video src="${v.thumbnail_url}" autoplay muted loop style="width:100%;height:100%;object-fit:cover"></video>`;
    return `<img src="${v.thumbnail_url}" style="width:100%;height:100%;object-fit:cover">`;
}

// Inicialização
if (sessionStorage.getItem('cp_auth') === '1') renderHome(); 
else {
    document.getElementById('app').innerHTML = `
    <div class="login-page">
      <div class="login-box">
        <div class="login-logo">🎬</div>
        <div class="login-title">Cine Play</div>
        <input class="login-input" type="password" id="loginPass" placeholder="Senha" />
        <button class="login-btn" onclick="doLogin()">Entrar</button>
        <div class="login-error" id="loginError">Senha Incorreta</div>
      </div>
    </div>`;
}
</script>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 50 },
    "color": { "value": "#e53e3e" },
    "line_linked": { "enable": true, "color": "#e53e3e" },
    "move": { "enable": true, "speed": 2 }
  }
});
</script>
</body>
</html>
